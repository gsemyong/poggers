name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
      - run: nub ci
      - run: nub run check

      - id: package
        name: Package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          nub version "$version" --no-git-tag-version --ignore-scripts
          directory="$RUNNER_TEMP/package"
          mkdir -p "$directory"
          nub pack --ignore-scripts --pack-destination "$directory"
          artifact="$(find "$directory" -maxdepth 1 -name '*.tgz' -type f)"
          test -n "$artifact"
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"

      - name: Verify packaged developer experience
        shell: bash
        run: |
          set -euo pipefail
          package="file:${{ steps.package.outputs.artifact }}"
          workspace="$RUNNER_TEMP/workspace"
          nubx -y -p "$package" kit create "$workspace" --package "$package"
          cd "$workspace"
          nub run check
          nub run build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          "${{ steps.package.outputs.artifact }}"
          --generate-notes
          --title "$GITHUB_REF_NAME"
          --verify-tag
